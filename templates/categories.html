{% extends "base.html" %}
{% block title %}Categorias — Fluxo de Caixa{% endblock %}

{% block content %}
<div class="section-header mb-4">
  <div>
    <h5 class="mb-0 fw-bold" style="letter-spacing:-.02em">Categorias</h5>
    <div class="text-muted" style="font-size:.78rem;margin-top:2px">Organize suas transações por categoria</div>
  </div>
  <button class="btn btn-primary" data-bs-toggle="modal" data-bs-target="#modalCat">
    <i class="bi bi-plus-lg me-1"></i>Nova Categoria
  </button>
</div>

<div class="row g-3">
  <div class="col-md-6">
    <div class="card p-4">
      <div class="section-title mb-3"><i class="bi bi-arrow-up-circle-fill" style="color:var(--income)"></i> Receitas</div>
      <div id="incomeCategories"></div>
    </div>
  </div>
  <div class="col-md-6">
    <div class="card p-4">
      <div class="section-title mb-3"><i class="bi bi-arrow-down-circle-fill" style="color:var(--expense)"></i> Despesas</div>
      <div id="expenseCategories"></div>
    </div>
  </div>
</div>

<!-- Modal -->
<div class="modal fade" id="modalCat" tabindex="-1">
  <div class="modal-dialog">
    <div class="modal-content">
      <div class="modal-header">
        <h5 class="modal-title">Nova Categoria</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
      </div>
      <div class="modal-body">
        <form id="formCat">
          <div class="mb-3">
            <label class="form-label">Nome *</label>
            <input type="text" name="name" class="form-control" required maxlength="100" placeholder="Ex: Alimentação, Salário...">
          </div>
          <div class="mb-3">
            <label class="form-label">Tipo *</label>
            <select name="type" class="form-select" required>
              <option value="income">Receita</option>
              <option value="expense">Despesa</option>
            </select>
          </div>
          <div class="mb-3">
            <label class="form-label">Cor</label>
            <input type="color" name="color" class="form-control form-control-color w-100" value="#7c3aed">
          </div>
        </form>
      </div>
      <div class="modal-footer">
        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancelar</button>
        <button type="button" class="btn btn-primary" onclick="saveCategory()">Salvar</button>
      </div>
    </div>
  </div>
</div>
{% endblock %}

{% block scripts %}
<script>
async function loadCategories() {
  const categories = await fetch("/api/categories/").then(r=>r.json());
  const income  = categories.filter(c=>c.type==="income");
  const expense = categories.filter(c=>c.type==="expense");

  const renderList = list => list.length
    ? list.map(c => `
        <div class="category-row">
          <div class="d-flex align-items-center gap-2">
            <span class="category-dot" style="background:${c.color};width:11px;height:11px"></span>
            <span style="font-size:.875rem">${c.name}</span>
          </div>
          <button class="btn btn-sm btn-outline-danger p-1" style="width:28px;height:28px;line-height:1" onclick="deleteCategory(${c.id})">
            <i class="bi bi-trash" style="font-size:.75rem"></i>
          </button>
        </div>`).join("")
    : `<p class="text-muted" style="font-size:.875rem">Nenhuma categoria.</p>`;

  document.getElementById("incomeCategories").innerHTML  = renderList(income);
  document.getElementById("expenseCategories").innerHTML = renderList(expense);
}

async function saveCategory() {
  const form = document.getElementById("formCat");
  const data = Object.fromEntries(new FormData(form));
  const res  = await fetch("/api/categories/", {
    method:"POST", headers:{"Content-Type":"application/json"}, body:JSON.stringify(data)
  });
  if(res.ok) {
    bootstrap.Modal.getInstance(document.getElementById("modalCat")).hide();
    form.reset();
    loadCategories();
  } else {
    const err = await res.json();
    alert("Erro: " + JSON.stringify(err.detail));
  }
}

async function deleteCategory(id) {
  if(!confirm("Excluir esta categoria?")) return;
  await fetch(`/api/categories/${id}`, {method:"DELETE"});
  loadCategories();
}

loadCategories();
</script>
{% endblock %}
